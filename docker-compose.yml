services:
  app:
    build: .
    image: liteoj:latest
    container_name: liteoj-app
    environment:
      PORT: 3000
      NODE_ENV: production
      DATA_DIR: /app/data
      DATABASE_PATH: /app/data/liteoj.db
      JWT_SECRET: ${JWT_SECRET:-liteoj-dev-secret-change-me}
      JUDGE_TOKEN: ${JUDGE_TOKEN:-liteoj-dev-judge-token}
    ports:
      - "3000:3000"
    volumes:
      - liteoj-data:/app/data
    command: sh -lc "node scripts/init.js && node backend/server.js"
    restart: unless-stopped

  judge:
    build: .
    image: liteoj:latest
    container_name: liteoj-judge
    environment:
      NODE_ENV: production
      BACKEND_URL: http://app:3000
      JUDGE_TOKEN: ${JUDGE_TOKEN:-liteoj-dev-judge-token}
      JUDGE_ID: local-judge-1
      JUDGE_POLL_INTERVAL_MS: 2000
      JUDGE_SANDBOX: ${JUDGE_SANDBOX:-host}
      JUDGE_SANDBOX_IMAGE: ${JUDGE_SANDBOX_IMAGE:-liteoj:latest}
    depends_on:
      - app
    command: node judge/worker.js
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:rw,exec,nosuid,size=512m
      - /home/judge:rw,exec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 768m
    cpus: 1.5
    restart: unless-stopped

volumes:
  liteoj-data:
