services:
  app:
    build:
      context: .
      network: ${DOCKER_BUILD_NETWORK:-host}
      args:
        APT_MIRROR: ${DOCKER_BUILD_APT_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian}
        APT_SECURITY_MIRROR: ${DOCKER_BUILD_APT_SECURITY_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian-security}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    image: liteoj:latest
    container_name: liteoj-app
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: production
      DATA_DIR: /app/data
      DATABASE_PATH: /app/data/liteoj.db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JUDGE_TOKEN: ${JUDGE_TOKEN:?JUDGE_TOKEN must be set in .env}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      JUDGE_LOCK_TIMEOUT_SECONDS: ${JUDGE_LOCK_TIMEOUT_SECONDS:-600}
      TESTDATA_ZIP_LIMIT: ${TESTDATA_ZIP_LIMIT:-50}
      TESTDATA_UNZIPPED_LIMIT: ${TESTDATA_UNZIPPED_LIMIT:-200}
      ATTACHMENT_FILE_LIMIT: ${ATTACHMENT_FILE_LIMIT:-200}
      CHECKER_SOURCE_LIMIT: ${CHECKER_SOURCE_LIMIT:-1}
      MANUAL_CASE_LIMIT: ${MANUAL_CASE_LIMIT:-5}
      PROBLEM_STORAGE_LIMIT: ${PROBLEM_STORAGE_LIMIT:-500}
      MAX_CODE_SIZE_KB: ${MAX_CODE_SIZE_KB:-128}
      SUBMIT_RATE_LIMIT: ${SUBMIT_RATE_LIMIT:-20}
      SUBMIT_RATE_WINDOW_SECONDS: ${SUBMIT_RATE_WINDOW_SECONDS:-60}
      MAX_PENDING_SUBMISSIONS_PER_USER: ${MAX_PENDING_SUBMISSIONS_PER_USER:-20}
      MAX_JUDGE_QUEUE: ${MAX_JUDGE_QUEUE:-500}
      LOGIN_RATE_LIMIT: ${LOGIN_RATE_LIMIT:-20}
      REGISTER_RATE_LIMIT: ${REGISTER_RATE_LIMIT:-10}
      XFYUN_API_KEY: ${XFYUN_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    volumes:
      - liteoj-data:/app/data
    command: sh -lc "node scripts/init.js && node backend/server.js"
    restart: unless-stopped

  go-judge:
    build:
      context: .
      dockerfile: Dockerfile.go-judge
      network: ${DOCKER_BUILD_NETWORK:-host}
      args:
        GO_JUDGE_VERSION: ${GO_JUDGE_VERSION:-1.12.0}
        APT_MIRROR: ${DOCKER_BUILD_APT_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian}
        APT_SECURITY_MIRROR: ${DOCKER_BUILD_APT_SECURITY_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian-security}
    image: liteoj-go-judge:latest
    container_name: liteoj-go-judge
    privileged: true
    shm_size: 256m
    ports:
      - "127.0.0.1:${GO_JUDGE_PORT:-5050}:5050"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5050/version >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  judge:
    profiles:
      - container-judge
    build:
      context: .
      network: ${DOCKER_BUILD_NETWORK:-host}
      args:
        APT_MIRROR: ${DOCKER_BUILD_APT_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian}
        APT_SECURITY_MIRROR: ${DOCKER_BUILD_APT_SECURITY_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian-security}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    image: liteoj:latest
    container_name: liteoj-judge
    environment:
      NODE_ENV: production
      BACKEND_URL: http://app:3000
      JUDGE_TOKEN: ${JUDGE_TOKEN:?JUDGE_TOKEN must be set in .env}
      JUDGE_ID: local-judge-1
      JUDGE_POLL_INTERVAL_MS: 2000
      JUDGE_MAX_OUTPUT_BYTES: ${JUDGE_MAX_OUTPUT_BYTES:-16777216}
      GO_JUDGE_URL: http://go-judge:5050
      GO_JUDGE_PROCESS_LIMIT: ${GO_JUDGE_PROCESS_LIMIT:-64}
      SPJ_TIMEOUT_MS: ${SPJ_TIMEOUT_MS:-3000}
      SPJ_MEMORY_LIMIT_MB: ${SPJ_MEMORY_LIMIT_MB:-256}
    depends_on:
      app:
        condition: service_started
      go-judge:
        condition: service_healthy
    command: node judge/worker.js
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:rw,exec,nosuid,size=512m
      - /home/judge:rw,exec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 768m
    cpus: 1.5
    restart: unless-stopped

volumes:
  liteoj-data:
